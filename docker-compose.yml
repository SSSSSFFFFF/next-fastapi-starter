services:
  db:
    image: postgres:16
    container_name: colvor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: colvor
      POSTGRES_PASSWORD: colvor123
      POSTGRES_DB: colvor_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
